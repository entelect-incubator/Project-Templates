<div class="min-h-screen flex flex-col transition-colors duration-300">
  <!-- Toast Notifications (Banner Style) -->
  <app-toast-banner />

  <!-- Header -->
  <app-header
    [cartCount]="cartCount()"
    (cartClick)="toggleCartDropdown()"
    (orderClick)="openOrderModal()"
  >
    <!-- Cart Dropdown Slot -->
    @if (showCartDropdown()) {
    <app-cart-dropdown (close)="closeCartDropdown()" (checkout)="openOrderModal()" />
    }
  </app-header>

  <!-- Main Content -->
  <main class="flex-1">
    <app-hero />
    <app-pizza-grid />
    <router-outlet />
  </main>

  <!-- Footer -->
  <app-footer />

  <!-- Order Modal -->
  @if (showOrderModal()) {
  <app-order-modal (close)="closeOrderModal()" />
  }
</div>
